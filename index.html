<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Chill Playlist</title>
<link rel="icon" href="avatar.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root{
        --night: #120e1a;
        --cream: #FFF6F0;
        --ink-soft: rgba(255, 246, 240, 0.68);
        --blossom: #FFB4C6;
        --lilac: #C9B6E4;
        --sky: #A8C7E8;
        --gold: #FFD9A0;
        --glass: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.2);
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    html, body{
        width:100%;
        height:100%;
    }

    body{
        font-family: 'Quicksand', sans-serif;
        color: var(--cream);
        width:100vw;
        height:100vh;
        height:100dvh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        position:relative;
        background:var(--night);
    }

    /* ---------- Video background ---------- */
    #bg-video{
        position:fixed;
        top:0; left:0;
        width:100vw; height:100vh;
        height:100dvh;
        object-fit:cover;
        z-index:-2;
    }

    .bg-overlay{
        position:fixed;
        inset:0;
        z-index:-1;
        background:
            radial-gradient(circle at 50% 15%, rgba(255,180,198,0.18), transparent 55%),
            linear-gradient(180deg, rgba(18,14,26,0.45) 0%, rgba(18,14,26,0.62) 55%, rgba(18,14,26,0.88) 100%);
        pointer-events:none;
    }

    /* ---------- Floating particles ---------- */
    .particles{
        position:fixed;
        inset:0;
        overflow:hidden;
        z-index:0;
        pointer-events:none;
    }

    .particle{
        position:absolute;
        bottom:-10%;
        opacity:0;
        line-height:1;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
        animation-name: floatUp;
        animation-timing-function: ease-in;
        animation-iteration-count: infinite;
        will-change: transform, opacity;
    }

    @keyframes floatUp{
        0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
        10%  { opacity:.85; }
        85%  { opacity:.5; }
        100% { transform: translateY(-115vh) translateX(var(--drift, 20px)) rotate(180deg); opacity:0; }
    }

    /* ---------- Cursor sparkle trail ---------- */
    .cursor-trail{
        position:fixed;
        inset:0;
        z-index:9999;
        pointer-events:none;
        overflow:hidden;
    }

    .cursor-star{
        position:fixed;
        left:0; top:0;
        pointer-events:none;
        text-shadow: 0 0 6px rgba(255,255,255,0.6);
        animation: starPop .75s ease-out forwards;
        will-change: transform, opacity;
    }

    @keyframes starPop{
        0%   { transform: translate(-50%,-50%) scale(.4) rotate(0deg); opacity:1; }
        60%  { opacity:.9; }
        100% { transform: translate(-50%,-50%) scale(1.15) translateY(-16px) rotate(50deg); opacity:0; }
    }

    /* ---------- Card ---------- */
    .container{
        position:relative;
        z-index:1;
        background: linear-gradient(160deg, rgba(255,255,255,0.09), rgba(255,255,255,0.02));
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 32px 28px 24px;
        width: 90%;
        max-width: 400px;
        max-height: 92vh;
        box-shadow: 0 20px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
        text-align:center;
        display:flex;
        flex-direction:column;
        overflow:hidden;
    }

    /* ---------- Rotating avatar disc ---------- */
    .disc-wrapper{
        width:140px;
        height:140px;
        position:relative;
        margin: 0 auto 18px;
        flex-shrink:0;
    }

    .disc-glow{
        position:absolute;
        inset:-20px;
        border-radius:50%;
        background: radial-gradient(circle, var(--blossom) 0%, transparent 70%);
        filter: blur(18px);
        opacity:.4;
        animation: pulseGlow 3s ease-in-out infinite;
        animation-play-state: paused;
    }

    .disc-ring{
        position:absolute;
        inset:0;
        border-radius:50%;
        background: conic-gradient(from 0deg, var(--blossom), var(--lilac), var(--sky), var(--gold), var(--blossom));
        animation: spin 7s linear infinite;
        animation-play-state: paused;
    }

    .disc{
        position:absolute;
        inset:6px;
        border-radius:50%;
        overflow:hidden;
        border: 3px solid rgba(255,255,255,0.92);
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        animation: spin 16s linear infinite;
        animation-play-state: paused;
        background:#000;
    }

    .disc-wrapper.is-playing .disc-glow,
    .disc-wrapper.is-playing .disc-ring,
    .disc-wrapper.is-playing .disc{
        animation-play-state: running;
    }

    .avatar-img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
    }

    @keyframes spin{ to{ transform: rotate(360deg); } }
    @keyframes pulseGlow{
        0%,100%{ opacity:.4; transform:scale(1); }
        50%{ opacity:.75; transform:scale(1.08); }
    }

    h2{
        font-family:'Fraunces', serif;
        font-style:italic;
        font-weight:600;
        font-size:23px;
        margin-bottom:4px;
    }

    .tagline{
        font-size:12.5px;
        color: var(--ink-soft);
        margin-bottom:16px;
        letter-spacing:.3px;
    }

    /* ---------- Now playing row ---------- */
    .now-playing{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        min-height:24px;
        margin-bottom:6px;
        padding:0 4px;
    }

    .eq-bars{
        display:flex;
        align-items:flex-end;
        gap:2px;
        height:14px;
        flex-shrink:0;
        opacity:0;
        transition:opacity .3s ease;
    }
    .eq-bars.playing{ opacity:1; }

    .eq-bars span{
        width:3px;
        height:100%;
        border-radius:2px;
        background: linear-gradient(180deg, var(--blossom), var(--lilac));
        animation: eqBounce .9s ease-in-out infinite;
        animation-play-state: paused;
    }
    .eq-bars.playing span{ animation-play-state: running; }
    .eq-bars span:nth-child(1){ animation-delay:0s; }
    .eq-bars span:nth-child(2){ animation-delay:.2s; }
    .eq-bars span:nth-child(3){ animation-delay:.4s; }
    .eq-bars span:nth-child(4){ animation-delay:.1s; }

    @keyframes eqBounce{
        0%,100%{ transform: scaleY(.25); }
        50%{ transform: scaleY(1); }
    }

    .song-title{
        font-family:'Fraunces', serif;
        font-style:italic;
        font-weight:500;
        font-size:15.5px;
        color: var(--cream);
        overflow:hidden;
        text-overflow:ellipsis;
        white-space:nowrap;
    }
    .song-title.fade-in{ animation: titleFade .5s ease; }
    @keyframes titleFade{ from{ opacity:0; transform:translateY(4px);} to{ opacity:1; transform:translateY(0);} }

    /* ---------- Player ---------- */
    .player{ margin-bottom:14px; flex-shrink:0; }

    .progress-bar{
        position:relative;
        height:6px;
        background: rgba(255,255,255,0.15);
        border-radius:10px;
        cursor:pointer;
        margin: 10px 2px 6px;
    }

    .progress-fill{
        position:absolute;
        left:0; top:0;
        height:100%;
        width:0%;
        border-radius:10px;
        background: linear-gradient(90deg, var(--blossom), var(--lilac));
    }

    .progress-thumb{
        position:absolute;
        top:50%; left:0%;
        width:13px; height:13px;
        border-radius:50%;
        background:#fff;
        transform: translate(-50%,-50%);
        box-shadow: 0 0 8px rgba(255,255,255,0.6);
        transition: box-shadow .2s ease;
    }
    .progress-bar:hover .progress-thumb{ box-shadow: 0 0 14px var(--blossom); }

    .time-row{
        display:flex;
        justify-content:space-between;
        font-size:11.5px;
        color: var(--ink-soft);
        padding:0 2px;
        margin-bottom:6px;
    }

    .controls{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:20px;
        margin: 12px 0 14px;
    }

    .ctrl-btn{
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.2);
        color:#fff;
        width:42px; height:42px;
        border-radius:50%;
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        transition: all .25s ease;
    }
    .ctrl-btn:hover{ background: rgba(255,255,255,0.25); transform: translateY(-2px); }
    .ctrl-btn:focus-visible{ outline: 2px solid var(--blossom); outline-offset:2px; }

    .play-btn{
        width:56px; height:56px;
        border:none;
        background: linear-gradient(135deg, var(--blossom), var(--lilac));
        box-shadow: 0 6px 18px rgba(255,180,198,0.4);
    }
    .play-btn svg{ margin-left:2px; }
    .play-btn:hover{ transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 24px rgba(255,180,198,0.55); }

    .volume-row{
        display:flex;
        align-items:center;
        gap:9px;
        padding:0 4px;
        opacity:.85;
    }
    .volume-row svg{ flex-shrink:0; color: var(--ink-soft); }

    input[type="range"]{
        -webkit-appearance:none;
        appearance:none;
        width:100%;
        height:4px;
        border-radius:10px;
        background: rgba(255,255,255,0.18);
        outline:none;
        cursor:pointer;
    }
    input[type="range"]::-webkit-slider-thumb{
        -webkit-appearance:none;
        width:13px; height:13px;
        border-radius:50%;
        background:#fff;
        box-shadow:0 0 6px rgba(255,255,255,0.7);
        cursor:pointer;
    }
    input[type="range"]::-moz-range-thumb{
        width:13px; height:13px;
        border:none;
        border-radius:50%;
        background:#fff;
        box-shadow:0 0 6px rgba(255,255,255,0.7);
        cursor:pointer;
    }

    .rain-btn, .repeat-btn, .shuffle-btn{
        flex-shrink:0;
        width:26px; height:26px;
        border-radius:50%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: var(--ink-soft);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        transition: all .25s ease;
        position:relative;
    }
    .rain-btn:hover, .repeat-btn:hover, .shuffle-btn:hover{ transform: scale(1.1); }
    .rain-btn.active{
        color: var(--sky);
        background: rgba(168,199,232,0.25);
        border-color: rgba(168,199,232,0.45);
    }
    .repeat-btn.active{
        color: var(--blossom);
        background: rgba(255,180,198,0.25);
        border-color: rgba(255,180,198,0.5);
    }
    .repeat-btn.active::after{
        content:'1';
        position:absolute;
        bottom:-4px; right:-4px;
        width:12px; height:12px;
        border-radius:50%;
        background: var(--blossom);
        color:#2a1220;
        font-size:8px;
        font-weight:700;
        display:flex; align-items:center; justify-content:center;
        box-shadow:0 0 4px rgba(0,0,0,0.4);
    }
    .shuffle-btn.active{
        color: var(--gold);
        background: rgba(255,217,160,0.25);
        border-color: rgba(255,217,160,0.5);
    }

    /* ---------- Search + favorite filter ---------- */
    .search-row{
        display:flex;
        align-items:center;
        gap:8px;
        margin-bottom:10px;
        flex-shrink:0;
    }

    .search-box{
        flex:1;
        min-width:0;
        display:flex;
        align-items:center;
        gap:6px;
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--glass-border);
        border-radius:20px;
        padding:6px 12px;
        color: var(--ink-soft);
        transition: border-color .2s ease, background .2s ease;
    }
    .search-box:focus-within{
        border-color: var(--blossom);
        background: rgba(255,255,255,0.13);
    }
    .search-box svg{ flex-shrink:0; }
    .search-box input{
        flex:1;
        min-width:0;
        background:none;
        border:none;
        outline:none;
        color: var(--cream);
        font-family:'Quicksand', sans-serif;
        font-size:12.5px;
    }
    .search-box input::placeholder{ color: var(--ink-soft); }

    .fav-filter-btn{
        flex-shrink:0;
        width:30px; height:30px;
        border-radius:50%;
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--glass-border);
        color: var(--ink-soft);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        transition: all .25s ease;
    }
    .fav-filter-btn:hover{ transform: scale(1.1); }
    .fav-filter-btn.active{
        color: var(--blossom);
        background: rgba(255,180,198,0.25);
        border-color: rgba(255,180,198,0.5);
    }

    .fav-heart{
        position:absolute;
        top:4px; right:4px;
        width:16px; height:16px;
        border:none;
        background:none;
        color: rgba(255,255,255,0.35);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        transition: color .2s ease, transform .2s ease;
        z-index:2;
    }
    .fav-heart:hover{ transform: scale(1.2); }
    .fav-heart.active{ color: var(--blossom); }

    /* ---------- Social icon row ---------- */
    .social-row{
        display:flex;
        justify-content:center;
        gap:12px;
        margin: 2px 0 14px;
        flex-shrink:0;
    }

    .social-btn{
        width:34px; height:34px;
        border-radius:50%;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        color: var(--cream);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        transition: all .25s ease;
        text-decoration:none;
    }
    .social-btn:hover{
        transform: translateY(-3px) scale(1.08);
        background: rgba(255,255,255,0.22);
        box-shadow: 0 6px 14px rgba(255,180,198,0.3);
        color: var(--blossom);
    }
    .social-btn:focus-visible{ outline: 2px solid var(--blossom); outline-offset:2px; }

    /* ---------- Toast ---------- */
    .toast{
        position:fixed;
        left:50%;
        bottom:28px;
        transform: translate(-50%, 12px);
        background: rgba(18,14,26,0.92);
        border: 1px solid var(--glass-border);
        color: var(--cream);
        padding:10px 18px;
        border-radius:30px;
        font-size:13px;
        font-family:'Quicksand', sans-serif;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        opacity:0;
        pointer-events:none;
        transition: opacity .3s ease, transform .3s ease;
        z-index:10000;
        white-space:nowrap;
    }
    .toast.show{
        opacity:1;
        transform: translate(-50%, 0);
    }

    /* ---------- Playlist (băng cuốn ngang) ---------- */
    .playlist-wrap{
        flex:1;
        min-height:0;
        display:flex;
        align-items:center;
        gap:6px;
        border-top: 1px solid rgba(255,255,255,0.18);
        padding-top:12px;
    }

    .reel-nav{
        flex-shrink:0;
        width:26px; height:26px;
        border-radius:50%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: var(--cream);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        font-size:15px;
        line-height:1;
        transition: all .2s ease;
    }
    .reel-nav:hover{ background: rgba(255,255,255,0.22); transform: scale(1.1); }

    .reel-container{
        flex:1;
        min-width:0;
        height:100%;
        overflow-x:auto;
        overflow-y:hidden;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
        mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
        -webkit-mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
    }
    .reel-container::-webkit-scrollbar{ height:5px; }
    .reel-container::-webkit-scrollbar-thumb{
        background: rgba(255,255,255,0.35);
        border-radius:10px;
    }

    ul{ list-style:none; }

    #playlist{
        display:flex;
        align-items:center;
        height:100%;
        gap:8px;
        padding: 4px 8px;
    }

    li.reel-item{
        position:relative;
        scroll-snap-align:center;
        flex:0 0 92px;
        height:calc(100% - 8px);
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:3px;
        padding:8px 6px;
        background: rgba(255,255,255,0.07);
        border: 1px solid transparent;
        border-radius:14px;
        cursor:pointer;
        overflow:hidden;
        transition: background .25s ease, transform .25s ease, box-shadow .25s ease, border-color .25s ease;
        text-align:center;
    }

    li.reel-item:hover{
        background: rgba(255,255,255,0.16);
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(255,180,198,0.22);
    }

    li.reel-item.active{
        background: linear-gradient(160deg, rgba(255,180,198,0.28), rgba(201,182,228,0.16));
        border-color: var(--blossom);
        transform: scale(1.06);
        box-shadow: 0 6px 18px rgba(255,180,198,0.3);
    }

    .track-num{
        font-size:10px;
        color: var(--ink-soft);
        font-variant-numeric: tabular-nums;
    }
    li.reel-item.active.is-playing .track-num{ display:none; }

    .track-name{
        font-size:11.5px;
        font-weight:600;
        line-height:1.25;
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
        width:100%;
    }

    .track-artist{
        font-size:9px;
        color: var(--ink-soft);
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        width:100%;
    }

    .track-eq{
        display:none;
        align-items:flex-end;
        gap:2px;
        height:11px;
    }
    li.reel-item.active.is-playing .track-eq{ display:flex; }

    .track-eq i{
        display:block;
        width:2.5px;
        height:100%;
        border-radius:2px;
        background: var(--blossom);
        animation: eqBounce .9s ease-in-out infinite;
    }
    .track-eq i:nth-child(2){ animation-delay:.2s; }
    .track-eq i:nth-child(3){ animation-delay:.4s; }

    @media (max-width: 420px){
        .container{ padding:26px 18px 18px; border-radius:22px; }
        .disc-wrapper{ width:120px; height:120px; }
        h2{ font-size:20px; }
        .controls{ gap:16px; }
        .social-btn{ width:31px; height:31px; }
        li.reel-item{ flex-basis:82px; }
    }

    @media (prefers-reduced-motion: reduce){
        *{
            animation-duration:.01ms !important;
            animation-iteration-count:1 !important;
            transition-duration:.01ms !important;
        }
        .particle{ display:none; }
    }
</style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="Backgruond.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
    <div class="particles" id="particles"></div>
    <div class="cursor-trail" id="cursor-trail"></div>

    <main class="container">
        <div class="disc-wrapper" id="disc-wrapper">
            <div class="disc-glow"></div>
            <div class="disc-ring"></div>
            <div class="disc">
                <img src="avatar.png" alt="Avatar" class="avatar-img">
            </div>
        </div>

        <h2>Saobawng</h2>
        <div class="tagline">một chút mộng mơ cho ngày dài 🌙</div>

        <div class="now-playing">
            <div class="eq-bars" id="eq-bars"><span></span><span></span><span></span><span></span></div>
            <div class="song-title" id="current-song-title">Chạm để bắt đầu giai điệu ✨</div>
        </div>

        <div class="player">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
            </div>
            <div class="time-row">
                <span id="current-time">0:00</span>
                <span id="duration-time">0:00</span>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="prev-btn" aria-label="Bài trước">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn play-btn" id="play-btn" aria-label="Phát">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="ctrl-btn" id="next-btn" aria-label="Bài tiếp theo">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
                </button>
            </div>

            <div class="volume-row">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Âm lượng">

    <div class="toast" id="toast"></div>

    <audio id="audio-player" preload="metadata" style="display:none;"></audio>
    <audio id="rain-audio" src="Rain.mp3" loop preload="auto" style="display:none;"></audio>

    <script>
        const songs = [
            { file: "Can We Kiss Forever.mp3", name: "Can We Kiss Forever?", artist: "Kina feat. Adriana Proenza" },
            { file: "Come My Way.mp3", name: "Come My Way", artist: "Sơn Tùng M-TP" },
            { file: "Daylight.mp3", name: "Daylight", artist: "David Kushner" },
            { file: "Death Bed.mp3", name: "Death Bed", artist: "Powfu & beabadoobee" },
            { file: "Die With A Smile.mp3", name: "Die With A Smile", artist: "Lady Gaga, Bruno Mars" },
            { file: "FAKE LOVE.mp3", name: "FAKE LOVE", artist: "BTS" },
            { file: "Gió Nổi Lên Rồi.mp3", name: "Gió Nổi Lên Rồi / 起风了", artist: "Châu Thâm" },
            { file: "Migraine.mp3", name: "Migraine", artist: "BoyWithUke" },
            { file: "Mood.mp3", name: "Mood", artist: "24kGoldn feat. iann dior" },
            { file: "Runaway.mp3", name: "Runaway", artist: "AURORA" },
            { file: "Sick Of U.mp3", name: "Sick Of U", artist: "BoyWithUke, Olivia O'Brien" },
            { file: "Toxic.mp3", name: "Toxic", artist: "BoyWithUke" },
            { file: "Understand.mp3", name: "Understand", artist: "BoyWithUke" },
            { file: "Waiting For Love.mp3", name: "Waiting For Love", artist: "Avicii" },
            { file: "Cry For Me.mp3", name: "Cry For Me x Giày Cao Gót", artist: "Various Artists" },
            { file: "Ransom.mp3", name: "Ransom", artist: "Lil Tecca" },
            { file: "Money.mp3", name: "Money", artist: "LISA" },
            { file: "Golden Hour.mp3", name: "Golden Hour", artist: "JVKE" },
            { file: "Sweater Weather.mp3", name: "Sweater Weather", artist: "The Neighbourhood" },
            { file: "Idgaf.mp3", name: "Idgaf", artist: "BoyWithUke, blackbear" },
            { file: "STAY.mp3", name: "Stay", artist: "The Kid LAROI & Justin Bieber" }
        ];

        const ICON_PLAY = '<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        const ICON_PAUSE = '<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

        const playlistEl = document.getElementById('playlist');
        const audioPlayer = document.getElementById('audio-player');
        const titleEl = document.getElementById('current-song-title');
        const discWrapper = document.getElementById('disc-wrapper');
        const eqBars = document.getElementById('eq-bars');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const progressThumb = document.getElementById('progress-thumb');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');
        const volumeSlider = document.getElementById('volume-slider');
        const bgVideo = document.getElementById('bg-video');

        let currentIndex = 0;
        let isPlaying = false;
        let isDragging = false;

        function formatTime(sec){
            if (isNaN(sec) || sec === Infinity) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        let favorites = new Set(JSON.parse(localStorage.getItem('bb_favorites') || '[]'));
        let favOnly = false;

        // Build playlist (dạng băng cuốn ngang)
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.className = 'reel-item';
            li.dataset.index = index;
            const isFav = favorites.has(song.file);
            li.innerHTML = `
                <button class="fav-heart${isFav ? ' active' : ''}" data-file="${song.file}" aria-label="Yêu thích bài này">
                    <svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.5 8.4 2.4 5 6 5c2 0 3.4 1 4 2.3.6-1.3 2-2.3 4-2.3 3.6 0 5.5 3.4 4 6.7C19.5 16.4 12 21 12 21z"/></svg>
                </button>
                <span class="track-num">${String(index + 1).padStart(2, '0')}</span>
                <span class="track-eq"><i></i><i></i><i></i></span>
                <span class="track-name">${song.name}</span>
                ${song.artist ? `<span class="track-artist">${song.artist}</span>` : ''}
            `;
            li.addEventListener('click', () => playSong(index));
            li.querySelector('.fav-heart').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(song.file, e.currentTarget);
            });
            playlistEl.appendChild(li);
        });

        function toggleFavorite(file, heartEl){
            if (favorites.has(file)) {
                favorites.delete(file);
            } else {
                favorites.add(file);
            }
            localStorage.setItem('bb_favorites', JSON.stringify([...favorites]));
            heartEl.classList.toggle('active', favorites.has(file));
            if (favOnly) applyFilters();
        }

        const searchInput = document.getElementById('search-input');
        const favFilterBtn = document.getElementById('fav-filter-btn');

        function applyFilters(){
            const query = searchInput.value.trim().toLowerCase();
            [...playlistEl.children].forEach((li, i) => {
                const song = songs[i];
                const matchesSearch = !query || song.name.toLowerCase().includes(query) || (song.artist && song.artist.toLowerCase().includes(query));
                const matchesFav = !favOnly || favorites.has(song.file);
                li.style.display = (matchesSearch && matchesFav) ? '' : 'none';
            });
        }

        searchInput.addEventListener('input', applyFilters);
        favFilterBtn.addEventListener('click', () => {
            favOnly = !favOnly;
            favFilterBtn.classList.toggle('active', favOnly);
            applyFilters();
        });

        // Reel manual nudge buttons
        const reelContainer = document.getElementById('reel-container');
        document.getElementById('reel-prev-btn').addEventListener('click', () => {
            reelContainer.scrollBy({ left: -160, behavior: 'smooth' });
        });
        document.getElementById('reel-next-btn').addEventListener('click', () => {
            reelContainer.scrollBy({ left: 160, behavior: 'smooth' });
        });

        function updatePlaylistUI(){
            [...playlistEl.children].forEach((li, i) => {
                li.classList.toggle('active', i === currentIndex);
                li.classList.toggle('is-playing', i === currentIndex && isPlaying);
            });
        }

        function updatePlayButton(){
            playBtn.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
            playBtn.setAttribute('aria-label', isPlaying ? 'Tạm dừng' : 'Phát');
        }

        function updateProgressUI(ratio){
            const pct = Math.min(1, Math.max(0, ratio || 0)) * 100;
            progressFill.style.width = pct + '%';
            progressThumb.style.left = pct + '%';
        }

        function playSong(index, autoplay = true){
            currentIndex = index;
            const song = songs[index];
            audioPlayer.src = 'Playlist/' + song.file;
            localStorage.setItem('bb_last_index', index);

            titleEl.classList.remove('fade-in');
            void titleEl.offsetWidth;
            const label = song.artist ? `${song.name} · ${song.artist}` : song.name;
            titleEl.textContent = (autoplay ? 'Đang phát: ' : 'Đã chọn: ') + label;
            titleEl.classList.add('fade-in');

            updatePlaylistUI();

            const activeLi = playlistEl.children[index];
            if (activeLi) activeLi.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });

            if (autoplay) audioPlayer.play().catch(() => {});
        }

        function togglePlay(){
            if (audioPlayer.paused) {
                audioPlayer.play().catch(() => {});
            } else {
                audioPlayer.pause();
            }
        }

        let shuffleEnabled = false;
        let shuffleHistory = [];

        function nextSong(){
            if (shuffleEnabled) {
                shuffleHistory.push(currentIndex);
                let rand = currentIndex;
                if (songs.length > 1) {
                    do { rand = Math.floor(Math.random() * songs.length); } while (rand === currentIndex);
                }
                currentIndex = rand;
                playSong(currentIndex);
            } else {
                currentIndex = (currentIndex + 1) % songs.length;
                playSong(currentIndex);
            }
        }

        function prevSong(){
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
                return;
            }
            if (shuffleEnabled) {
                currentIndex = shuffleHistory.length ? shuffleHistory.pop() : currentIndex;
                playSong(currentIndex);
            } else {
                currentIndex = (currentIndex - 1 + songs.length) % songs.length;
                playSong(currentIndex);
            }
        }

        const shuffleToggleBtn = document.getElementById('shuffle-toggle');
        shuffleToggleBtn.addEventListener('click', () => {
            shuffleEnabled = !shuffleEnabled;
            shuffleHistory = [];
            shuffleToggleBtn.classList.toggle('active', shuffleEnabled);
            shuffleToggleBtn.title = shuffleEnabled ? 'Đang phát ngẫu nhiên' : 'Phát ngẫu nhiên';
        });

        audioPlayer.addEventListener('play', () => {
            isPlaying = true;
            updatePlayButton();
            updatePlaylistUI();
            eqBars.classList.add('playing');
            discWrapper.classList.add('is-playing');
            updateRainTarget();
        });

        audioPlayer.addEventListener('pause', () => {
            isPlaying = false;
            updatePlayButton();
            updatePlaylistUI();
            eqBars.classList.remove('playing');
            discWrapper.classList.remove('is-playing');
            updateRainTarget();
        });

        let repeatOne = false;
        const repeatToggleBtn = document.getElementById('repeat-toggle');
        repeatToggleBtn.addEventListener('click', () => {
            repeatOne = !repeatOne;
            repeatToggleBtn.classList.toggle('active', repeatOne);
            repeatToggleBtn.title = repeatOne ? 'Đang lặp lại bài này' : 'Lặp lại 1 bài';
        });

        audioPlayer.addEventListener('ended', () => {
            if (repeatOne) {
                audioPlayer.currentTime = 0;
                audioPlayer.play().catch(() => {});
            } else {
                nextSong();
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            durationTimeEl.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (isDragging) return;
            updateProgressUI(audioPlayer.currentTime / (audioPlayer.duration || 1));
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
        });

        function setProgressFromEvent(e){
            const rect = progressBar.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let ratio = (clientX - rect.left) / rect.width;
            ratio = Math.min(1, Math.max(0, ratio));
            if (audioPlayer.duration) audioPlayer.currentTime = ratio * audioPlayer.duration;
            updateProgressUI(ratio);
        }

        progressBar.addEventListener('mousedown', (e) => { isDragging = true; setProgressFromEvent(e); });
        window.addEventListener('mousemove', (e) => { if (isDragging) setProgressFromEvent(e); });
        window.addEventListener('mouseup', () => { isDragging = false; });

        progressBar.addEventListener('touchstart', (e) => { isDragging = true; setProgressFromEvent(e); });
        window.addEventListener('touchmove', (e) => { if (isDragging) setProgressFromEvent(e); });
        window.addEventListener('touchend', () => { isDragging = false; });

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);

        volumeSlider.addEventListener('input', (e) => {
            audioPlayer.volume = parseFloat(e.target.value);
            localStorage.setItem('bb_volume', e.target.value);
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            else if (e.code === 'ArrowRight') nextSong();
            else if (e.code === 'ArrowLeft') prevSong();
        });

        // Safety net: force the background video to loop even if the
        // 'loop' attribute is ever ignored (some mobile browser quirks).
        bgVideo.addEventListener('ended', () => {
            bgVideo.currentTime = 0;
            bgVideo.play().catch(() => {});
        });

        // Initial state (no autoplay — browsers block audio-with-sound autoplay anyway)
        const savedVolume = localStorage.getItem('bb_volume');
        if (savedVolume !== null) {
            const vol = parseFloat(savedVolume);
            audioPlayer.volume = vol;
            volumeSlider.value = vol;
        }

        const savedIndex = parseInt(localStorage.getItem('bb_last_index'), 10);
        if (!isNaN(savedIndex) && savedIndex >= 0 && savedIndex < songs.length) {
            currentIndex = savedIndex;
        }
        audioPlayer.src = 'Playlist/' + songs[currentIndex].file;
        updatePlaylistUI();
        const restoredLi = playlistEl.children[currentIndex];
        if (restoredLi) restoredLi.scrollIntoView({ block: 'nearest', inline: 'center' });
        if (currentIndex !== 0) {
            const s = songs[currentIndex];
            titleEl.textContent = 'Đã chọn: ' + (s.artist ? `${s.name} · ${s.artist}` : s.name);
        }

        // ---------- Floating dreamy particles ----------
        const particlesContainer = document.getElementById('particles');
        const particleChars = ['♥', '✦', '✧', '♡'];
        const particleColors = ['var(--blossom)', 'var(--lilac)', 'var(--gold)', 'var(--sky)'];

        function spawnParticles(n){
            for (let i = 0; i < n; i++) {
                const p = document.createElement('span');
                p.className = 'particle';
                p.textContent = particleChars[Math.floor(Math.random() * particleChars.length)];
                const size = (Math.random() * 14 + 10).toFixed(1);
                const left = (Math.random() * 100).toFixed(2);
                const duration = (Math.random() * 14 + 14).toFixed(1);
                const delay = (-(Math.random() * duration)).toFixed(1);
                const drift = (Math.random() * 80 - 40).toFixed(0) + 'px';
                const color = particleColors[Math.floor(Math.random() * particleColors.length)];

                p.style.left = left + '%';
                p.style.fontSize = size + 'px';
                p.style.color = color;
                p.style.setProperty('--drift', drift);
                p.style.animationDuration = duration + 's';
                p.style.animationDelay = delay + 's';

                particlesContainer.appendChild(p);
            }
        }
        spawnParticles(18);

        // ---------- Cursor sparkle trail ----------
        const cursorTrail = document.getElementById('cursor-trail');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const cursorChars = ['✦', '✧', '☆', '✨'];
        const cursorColors = ['var(--blossom)', 'var(--lilac)', 'var(--gold)', 'var(--sky)', '#ffffff'];
        let lastSpawn = 0;
        const spawnGapMs = 45;

        function spawnCursorStar(x, y){
            const s = document.createElement('span');
            s.className = 'cursor-star';
            s.textContent = cursorChars[Math.floor(Math.random() * cursorChars.length)];
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            s.style.fontSize = (Math.random() * 8 + 10).toFixed(1) + 'px';
            s.style.color = cursorColors[Math.floor(Math.random() * cursorColors.length)];
            cursorTrail.appendChild(s);
            s.addEventListener('animationend', () => s.remove());
        }

        function handlePointerMove(x, y){
            const now = performance.now();
            if (now - lastSpawn < spawnGapMs) return;
            lastSpawn = now;
            spawnCursorStar(x, y);
        }

        if (!prefersReducedMotion) {
            window.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
            window.addEventListener('touchmove', (e) => {
                if (e.touches && e.touches[0]) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });
        }

        // ---------- Soft rain ambience (Rain.mp3, loops like the background video) ----------
        // Plays gently whenever no song is playing, and fades out while music plays.
        const rainToggleBtn = document.getElementById('rain-toggle');
        const rainAudio = document.getElementById('rain-audio');
        let rainEnabled = true;
        let rainFadeFrame = null;
        const RAIN_TARGET_VOLUME = 80 / 100; // 20%
        const RAIN_FADE_MS = 1200;

        rainAudio.loop = true;
        rainAudio.volume = 0;

        // Safety net: keep it looping even if the 'loop' attribute is ever ignored.
        rainAudio.addEventListener('ended', () => {
            rainAudio.currentTime = 0;
            rainAudio.play().catch(() => {});
        });

        function fadeRainTo(target){
            if (rainFadeFrame) cancelAnimationFrame(rainFadeFrame);
            const start = rainAudio.volume;
            const startTime = performance.now();
            function step(now){
                const t = Math.min(1, (now - startTime) / RAIN_FADE_MS);
                rainAudio.volume = start + (target - start) * t;
                if (t < 1) {
                    rainFadeFrame = requestAnimationFrame(step);
                } else {
                    rainFadeFrame = null;
                }
            }
            rainFadeFrame = requestAnimationFrame(step);
        }

        function updateRainTarget(){
            const target = (rainEnabled && !isPlaying) ? RAIN_TARGET_VOLUME : 0;
            fadeRainTo(target);
        }

        // Browsers require a user gesture before any audio can start playing.
        // The first tap/click/keypress anywhere quietly wakes the rain up.
        function wakeAmbienceOnce(){
            rainAudio.play().then(updateRainTarget).catch(() => {});
            document.removeEventListener('pointerdown', wakeAmbienceOnce);
            document.removeEventListener('keydown', wakeAmbienceOnce);
        }
        document.addEventListener('pointerdown', wakeAmbienceOnce, { once: true });
        document.addEventListener('keydown', wakeAmbienceOnce, { once: true });

        rainToggleBtn.addEventListener('click', () => {
            rainEnabled = !rainEnabled;
            rainToggleBtn.classList.toggle('active', rainEnabled);
            rainAudio.play().then(updateRainTarget).catch(() => {});
        });

        // ---------- Social row: Discord ID copy + toast ----------
        const toastEl = document.getElementById('toast');
        let toastTimer = null;

        function showToast(msg){
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
        }

        document.getElementById('social-discord').addEventListener('click', () => {
            const discordId = 'saobawng';
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(discordId)
                    .then(() => showToast('Đã sao chép Discord ID 💬'))
                    .catch(() => showToast(`Discord ID: ${discordId}`));
            } else {
                showToast(`Discord ID: ${discordId}`);
            }
        });
    </script>
</body>
</html>
